name: budget4home web

jobs:
  dev:
    name: build 🛠️
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18.x'
      - uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies 🧰
        run: npm i install
      - name: Build 🛠️
        run: npm run build
      - name: Lint ✅
        run: npm run lint
      - name: Test 🧪
        shell: bash
        run: |
          npm install -g firebase-tools && |
          firebase emulators:exec --only firestore "npm run test --exit"
